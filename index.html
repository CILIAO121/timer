<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="計時器">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>計時器</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    background: #0f0f0f;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    color: #fff;
    overflow: hidden;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 52px;
    padding: 80px 24px 40px;
  }

  /* 倒數數字 */
  .time-display {
    font-size: 140px;
    font-weight: 100;
    letter-spacing: 6px;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    color: #fff;
    transition: color 0.3s;
  }

  .time-display.done {
    color: #ef5350;
  }

  /* 時間選擇器 */
  .selector {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .adj-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 1px solid #2e2e2e;
    background: #1a1a1a;
    color: #888;
    font-size: 26px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.1s, color 0.1s;
  }

  .adj-btn:active {
    background: #2a2a2a;
    color: #fff;
  }

  .set-value {
    font-size: 28px;
    font-weight: 300;
    color: #aaa;
    min-width: 90px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  /* 主按鈕 */
  .start-btn {
    width: 500px;
    height: 100px;
    border-radius: 50px;
    border: none;
    background: #4fc3f7;
    color: #0f0f0f;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: transform 0.1s, background 0.2s;
  }

  .start-btn:active {
    transform: scale(0.96);
  }

  .start-btn.running {
    background: #ef5350;
    color: #fff;
  }
</style>
</head>
<body>
<div class="container">

  <div class="time-display" id="display">00:30</div>

  <div class="selector">
    <button class="adj-btn" id="btnMinus">−</button>
    <div class="set-value" id="setVal">30 秒</div>
    <button class="adj-btn" id="btnPlus">＋</button>
  </div>

  <button class="start-btn" id="startBtn">開始</button>

</div>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }

  let audioCtx = null;

  function getAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    // iOS requires resume after user gesture
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playSound(type) {
    if (type === 'none') return;
    const ctx = getAudio();
    const now = ctx.currentTime;

    const configs = {
      single:  [[0,    880, null, 0.4]],
      triple:  [[0,    880, null, 0.15], [0.22, 880, null, 0.15], [0.44, 880, null, 0.15]],
      rising:  [[0,    440, 880,  0.5]],
      falling: [[0,    880, 440,  0.5]],
    };

    configs[type].forEach(([delay, freqA, freqB, dur]) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(freqA, now + delay);
      if (freqB) osc.frequency.exponentialRampToValueAtTime(freqB, now + delay + dur);
      gain.gain.setValueAtTime(1.0, now + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, now + delay + dur);
      osc.start(now + delay);
      osc.stop(now + delay + dur + 0.05);
    });
  }

  let setSeconds = 30;
  let remaining  = 30;
  let timerId    = null;
  let running    = false;

  const displayEl = document.getElementById('display');
  const setValEl  = document.getElementById('setVal');
  const startBtn  = document.getElementById('startBtn');

  function fmt(s) {
    const m   = String(Math.floor(s / 60)).padStart(2, '0');
    const sec = String(s % 60).padStart(2, '0');
    return `${m}:${sec}`;
  }

  function stopTimer() {
    clearInterval(timerId);
    timerId = null;
    running = false;
    startBtn.textContent = '開始';
    startBtn.classList.remove('running');
  }

  function startTimer() {
    // Unlock audio on user gesture
    getAudio();

    stopTimer();
    remaining = setSeconds;
    displayEl.textContent = fmt(remaining);
    displayEl.classList.remove('done');
    running = true;
    startBtn.textContent = '重置';
    startBtn.classList.add('running');

    timerId = setInterval(() => {
      remaining--;
      displayEl.textContent = fmt(remaining);
      if (remaining <= 0) {
        stopTimer();
        displayEl.classList.add('done');
        playSound('triple');
      }
    }, 1000);
  }

  function adjustTime(delta) {
    const next = setSeconds + delta;
    if (next < 10 || next > 600) return;
    setSeconds = next;
    setValEl.textContent = setSeconds + ' 秒';
    if (!running) {
      remaining = setSeconds;
      displayEl.textContent = fmt(remaining);
      displayEl.classList.remove('done');
    }
  }

  startBtn.addEventListener('click', startTimer);
  document.getElementById('btnMinus').addEventListener('click', () => adjustTime(-10));
  document.getElementById('btnPlus').addEventListener('click',  () => adjustTime(10));
</script>
</body>
</html>
